<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f6f3ed">
  <meta name="description" content="PDFに文字だけを追記し、透かしなしで保存できるブラウザアプリ">
  <title>PDF Text Writer</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="./" aria-label="PDF Text Writer ホーム">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M6.5 2.75h7l4 4v14.5h-11z"/><path d="M13.5 2.75v4h4M9 12h6M9 15.5h4.5"/></svg>
      </span>
      <span>
        <strong>PDF Text Writer</strong>
        <small>文字だけを、きれいに追記。</small>
      </span>
    </a>

    <div class="header-actions">
      <label class="button button-secondary file-button" for="pdfFileInput">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V4m0 0L7.5 8.5M12 4l4.5 4.5M5 14v5h14v-5"/></svg>
        <span>PDFを開く</span>
      </label>
      <input id="pdfFileInput" type="file" accept="application/pdf,.pdf" hidden>
      <button id="saveButton" class="button button-primary" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v12m0 0l-4.5-4.5M12 16l4.5-4.5M5 19.5h14"/></svg>
        <span>PDFを保存</span>
      </button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="tool-panel" aria-label="編集ツール">
      <div class="tool-panel-heading">
        <div>
          <span class="eyebrow">EDIT TOOLS</span>
          <h1>追記ツール</h1>
        </div>
        <span id="pageCount" class="page-count">PDF未選択</span>
      </div>

      <button id="addTextButton" class="add-text-button" type="button" disabled aria-pressed="false">
        <span class="plus">＋</span>
        <span><strong>テキストを追加</strong><small>押してからPDF上をクリック</small></span>
      </button>

      <div class="property-group">
        <label for="fontSizeInput">文字サイズ</label>
        <div class="number-field">
          <input id="fontSizeInput" type="number" min="6" max="120" step="1" value="16" disabled>
          <span>pt</span>
        </div>
      </div>

      <div class="property-row">
        <div class="property-group color-group">
          <label for="fontColorInput">文字色</label>
          <div class="color-field">
            <input id="fontColorInput" type="color" value="#172033" disabled>
            <span id="colorValue">#172033</span>
          </div>
        </div>
        <div class="property-group">
          <span class="field-label">太字</span>
          <button id="boldButton" class="icon-tool text-icon" type="button" disabled aria-pressed="false" title="太字">B</button>
        </div>
      </div>

      <div class="property-group">
        <label for="alignSelect">文字揃え</label>
        <select id="alignSelect" disabled>
          <option value="left">左揃え</option>
          <option value="center">中央揃え</option>
          <option value="right">右揃え</option>
        </select>
      </div>

      <div class="tool-divider"></div>

      <div class="secondary-tools">
        <div class="zoom-tools" aria-label="ズーム">
          <button id="zoomOutButton" class="icon-tool" type="button" disabled aria-label="縮小">−</button>
          <output id="zoomValue">100%</output>
          <button id="zoomInButton" class="icon-tool" type="button" disabled aria-label="拡大">＋</button>
        </div>
        <button id="deleteButton" class="delete-button" type="button" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7V4.5h8V7m-11 0h14M7 7l.75 12h8.5L17 7M10 10v6m4-6v6"/></svg>
          削除
        </button>
      </div>

      <p class="privacy-note">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10V7a5 5 0 0110 0v3m-11 0h12v10H6z"/></svg>
        PDFはサーバーへ送信されません。処理はこのブラウザ内だけで完結します。
      </p>
    </aside>

    <section class="workspace" aria-label="PDF編集エリア">
      <div class="workspace-bar">
        <div class="file-status">
          <span class="status-dot"></span>
          <span id="fileName">PDFを選択してください</span>
        </div>
        <div id="statusMessage" class="status-message" role="status" aria-live="polite">ファイルは端末内だけで処理されます</div>
      </div>

      <div id="viewer" class="viewer">
        <div id="emptyState" class="empty-state">
          <div class="empty-illustration" aria-hidden="true">
            <div class="paper paper-back"></div>
            <div class="paper paper-front">
              <span></span><span></span><span></span>
              <i>T</i>
            </div>
          </div>
          <span class="eyebrow">START HERE</span>
          <h2>PDFに文字を追加する</h2>
          <p>PDFを開いて、好きな場所に文字を置くだけ。<br>透かしやアプリ名は追加されません。</p>
          <label class="button button-primary empty-open-button" for="pdfFileInput">PDFを選択</label>
          <small>対応形式：PDF ／ ファイルはアップロードされません</small>
        </div>
      </div>
    </section>
  </main>

  <nav class="mobile-toolbar" aria-label="モバイル編集ツール">
    <button id="mobileAddButton" type="button" disabled><span>＋</span>文字追加</button>
    <button id="mobileSizeButton" type="button" disabled><span>A</span>サイズ</button>
    <label id="mobileColorLabel" class="mobile-color" aria-disabled="true"><span></span>文字色<input id="mobileColorInput" type="color" value="#172033" disabled></label>
    <button id="mobileDeleteButton" type="button" disabled><span>⌫</span>削除</button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
